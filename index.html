<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Title + description + canonical + OG/Twitter + JSON-LD are injected
      per-route by vite-prerender-plugin (see src/prerender.tsx → buildHead).
      Keeping them out of this template avoids duplicate tags on sub-pages.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      /* Pre-hydration theme resolver. Runs BEFORE React mounts so the
         <html data-theme> attribute is set before the first paint —
         prevents a flash of dark on a light-mode system (or vice versa).
         Mirrors the logic in src/hooks/useTheme.ts (any change there must
         be mirrored here). */
      (function () {
        try {
          var stored = window.localStorage.getItem('lcw:theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
