    <meta name="description" content="Cakalic Design - Web Design, UI/UX, Vehicle Wraps, and Branding by Luke Cakalic" />
    <title>Cakalic Design | Luke Cakalic</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://lukecakalic.com/" />

    <!-- Open Graph -->

    <meta property="og:site_name" content="Cakalic Design" />

    <meta property="og:description" content="Web Design, UI/UX, Vehicle Wraps, and Branding by Luke Cakalic — based in Colorado." />
    <meta property="og:url" content="https://lukecakalic.com/" />
    <meta property="og:image" content="https://lukecakalic.com/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cakalic Design — portfolio of Luke Cakalic" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cakalic Design | Luke Cakalic" />
    <meta name="twitter:description" content="Web Design, UI/UX, Vehicle Wraps, and Branding by Luke Cakalic." />
    <meta name="twitter:image" content="https://lukecakalic.com/og-cover.jpg" />

    <!-- JSON-LD: Person + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Person",
          "name": "Luke Cakalic",
          "url": "https://lukecakalic.com/",
          "jobTitle": "Designer & Developer",
          "address": { "@type": "PostalAddress", "addressRegion": "CO", "addressCountry": "US" }
        },
        {
          "@type": "WebSite",
          "url": "https://lukecakalic.com/",
          "name": "Cakalic Design",
          "publisher": { "@type": "Person", "name": "Luke Cakalic" }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      /* Pre-hydration theme resolver. Runs BEFORE React mounts so the
         <html data-theme> attribute is set before the first paint —
         prevents a flash of dark on a light-mode system (or vice versa).
         Mirrors the logic in src/hooks/useTheme.ts (any change there must
         be mirrored here). */
      (function () {
        try {
          var stored = window.localStorage.getItem('lcw:theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = (stored === 'light' || stored === 'dark') ? stored : (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
